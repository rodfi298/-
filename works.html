<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Все работы — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:#fff;color:#000;font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:90;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 5vw;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.07);transition:padding .35s;}
nav.sc{padding:.95rem 5vw;}
.nav-logo{font-family:'Montserrat',sans-serif;font-weight:900;font-size:1rem;letter-spacing:-.04em;color:#000;text-transform:uppercase;}
.nav-back{display:inline-flex;align-items:center;gap:.7rem;font-family:'Montserrat',sans-serif;font-weight:700;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:#aaa;transition:color .2s;}
.nav-back::before{content:'←';font-size:.8rem;}
.nav-back:hover{color:#000;}

/* PAGE HEADER */
.page-header{padding:calc(8vmin + 72px) 5vw 5vmin;border-bottom:1px solid rgba(0,0,0,.08);}
.page-header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap;}
.page-title{font-family:'Montserrat',sans-serif;font-weight:900;font-size:clamp(2.5rem,8vw,6rem);letter-spacing:-.05em;line-height:.88;text-transform:uppercase;}
.page-title em{font-style:italic;font-weight:700;}
.page-count{font-family:'Montserrat',sans-serif;font-size:.56rem;letter-spacing:.28em;color:#bbb;text-transform:uppercase;}

/* FILTER */
#works-filter{display:flex;gap:.35rem;flex-wrap:wrap;padding:1.8rem 5vw;border-bottom:1px solid rgba(0,0,0,.07);}
.fbtn{background:none;border:1px solid rgba(0,0,0,.12);color:#aaa;padding:.38rem 1rem;font-family:'Montserrat',sans-serif;font-weight:600;font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.fbtn:hover,.fbtn.active{border-color:#000;color:#000;}

/* GRID — flex columns (no CSS columns, no gaps/orphans) */
.works-grid{display:flex;gap:6px;padding:6px 5vw;}
.works-col{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}

/* CARD — NO reveal animation */
.wcard{position:relative;background:#f5f5f5;overflow:hidden;cursor:pointer;display:block;}
.wcard img,.wcard video{width:100%;height:auto;display:block;transition:transform .7s cubic-bezier(.25,.46,.45,.94);}
.wcard:hover img,.wcard:hover video{transform:scale(1.04);}
.woverlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.1) 40%,transparent 65%);opacity:0;transition:opacity .35s;display:flex;flex-direction:column;justify-content:flex-end;padding:1.4rem;}
.wcard:hover .woverlay{opacity:1;}
.wcard-title{font-family:'Montserrat',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:-.02em;color:#fff;text-transform:uppercase;}
.wcard-cat{font-family:'Montserrat',sans-serif;font-size:.52rem;letter-spacing:.2em;color:rgba(255,255,255,.55);text-transform:uppercase;margin-top:.3rem;}
.wbadge{position:absolute;top:.9rem;right:.9rem;font-family:'Montserrat',sans-serif;font-size:.46rem;letter-spacing:.16em;text-transform:uppercase;background:#fff;color:#000;padding:.22rem .55rem;font-weight:700;}
.works-empty{padding:6rem 5vw;color:#ccc;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;font-family:'Montserrat',sans-serif;}

/* FOOTER */
footer{padding:1.6rem 5vw;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(0,0,0,.06);}
footer span{font-family:'Montserrat',sans-serif;font-size:.5rem;letter-spacing:.18em;color:#ccc;text-transform:uppercase;}

/* LIGHTBOX */
.lb{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .35s,visibility .35s;}
.lb.open{opacity:1;visibility:visible;}
.lb-media{display:flex;align-items:center;justify-content:center;flex:1;width:100%;max-height:80vh;}
.lb-media iframe,.lb-media video{width:min(88vw,1100px);height:min(56vw,620px);display:block;}
.lb-media img{max-width:88vw;max-height:75vh;object-fit:contain;display:block;}
.lb-bar{position:fixed;bottom:0;left:0;right:0;padding:1.2rem 5vw;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);display:flex;justify-content:space-between;align-items:center;}
.lb-nav button{background:none;border:1px solid rgba(255,255,255,.18);color:#fff;width:36px;height:36px;font-size:1rem;cursor:pointer;transition:background .2s;}
.lb-nav button:hover{background:rgba(255,255,255,.1);}
.lb-close{background:none;border:1px solid rgba(255,255,255,.18);color:#fff;padding:.5rem 1.2rem;font-family:'Montserrat',sans-serif;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.lb-close:hover{background:rgba(255,255,255,.1);}
.lb-nav{display:flex;gap:.4rem;}

/* REVEAL — only for non-card elements */
.reveal{opacity:0;transform:translateY(18px);transition:opacity .6s cubic-bezier(.25,.46,.45,.94),transform .6s cubic-bezier(.25,.46,.45,.94);}
.reveal.in{opacity:1;transform:none;}

/* RESPONSIVE */
@media(max-width:640px){
  .works-grid{gap:4px;padding:4px 5vw;}
  .works-col{gap:4px;}
  .page-header{padding-top:calc(6vmin + 72px);}
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="nav-logo" id="nav-logo">A.M.</div>
  <a class="nav-back" href="index.html">Назад</a>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-inner reveal">
    <h1 class="page-title">Все<br><em>работы</em></h1>
    <p class="page-count" id="page-count"></p>
  </div>
</div>

<!-- FILTER -->
<div id="works-filter"></div>

<!-- GRID -->
<main>
  <div class="works-grid" id="works-grid">
    <div class="works-empty" id="works-empty" style="display:none;"><p>Загрузка...</p></div>
  </div>
  <div id="loading-msg" style="padding:4rem 5vw;color:#ccc;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;font-family:'Montserrat',sans-serif;">Загрузка...</div>
</main>

<footer>
  <span id="footer-copy">© 2025</span>
</footer>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <div class="lb-media" id="lb-media"></div>
  <div class="lb-bar">
    <div>
      <p id="lb-title" style="font-family:'Montserrat',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:-.02em;text-transform:uppercase;color:#fff;"></p>
      <p id="lb-cat" style="font-family:'Montserrat',sans-serif;font-size:.5rem;letter-spacing:.2em;color:rgba(255,255,255,.45);text-transform:uppercase;margin-top:.3rem;"></p>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center;">
      <div class="lb-nav"><button onclick="lbNav(-1)">←</button><button onclick="lbNav(1)">→</button></div>
      <button class="lb-close" onclick="closeLb()">✕ Закрыть</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1WbuPS28Bl62cj_tXNm4-sdrmZsOCbXTbLlUX3ptjbR0';

function sheetUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}`;
}

async function fetchSheet(name) {
  try {
    const res = await fetch(sheetUrl(name));
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const cols = json.table.cols.map(c => c.label.trim());
    return (json.table.rows || []).map(row => {
      const obj = {};
      cols.forEach((col, i) => {
        const cell = row.c[i];
        obj[col] = cell ? (cell.v !== null && cell.v !== undefined ? String(cell.v).trim() : '') : '';
      });
      return obj;
    }).filter(row => Object.values(row).some(v => v));
  } catch(e) { return []; }
}

function gdriveId(url) {
  if (!url) return null;
  let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (m) return m[1];
  m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/); if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{25,}$/.test(url.trim())) return url.trim();
  return null;
}
function isGdrive(url) { return url && url.includes('drive.google.com'); }
function ytId(url) { const m = (url||'').match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
function viId(url) { const m = (url||'').match(/vimeo\.com\/(\d+)/); return m ? m[1] : null; }

let allWorks = [], visibleWorks = [], lbIdx = 0;

function getColCount() {
  const w = window.innerWidth;
  if (w <= 640) return 2;
  if (w <= 900) return 3;
  return 4;
}

async function init() {
  // Try sessionStorage first (instant), then fetch from sheet
  const cached = sessionStorage.getItem('allWorks');
  let rows;
  if (cached) {
    try { rows = JSON.parse(cached); } catch(e) { rows = null; }
  }
  if (!rows) {
    const raw = await fetchSheet('Works');
    rows = raw.map((r, i) => ({
      id: String(i),
      title: r.title || r.Title || '',
      category: r.category || r.Category || '',
      src: r.src || r.Src || r.url || r.URL || r.link || r.Link || '',
      type: (r.type || r.Type || 'video').toLowerCase(),
      year: r.year || r.Year || '',
      client: r.client || r.Client || '',
      desc: r.desc || r.Desc || r.description || ''
    })).filter(w => w.title && w.src);
  }

  allWorks = rows;
  visibleWorks = [...allWorks];

  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('page-count').textContent = allWorks.length + ' работ';
  document.getElementById('footer-copy').textContent = '© ' + new Date().getFullYear();

  renderFilters(allWorks);
  renderGrid(allWorks);

  // Reveal only header
  setTimeout(() => {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
  }, 50);
}

function renderFilters(works) {
  const cats = ['all', ...new Set(works.map(w => w.category).filter(Boolean))];
  const bar = document.getElementById('works-filter');
  bar.innerHTML = '';
  if (cats.length <= 1) return;
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'fbtn' + (c === 'all' ? ' active' : '');
    b.textContent = c === 'all' ? 'Все' : c;
    b.onclick = () => {
      document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      visibleWorks = c === 'all' ? [...allWorks] : allWorks.filter(w => w.category === c);
      renderGrid(visibleWorks);
    };
    bar.appendChild(b);
  });
}

function makeCard(w, globalIdx) {
  const el = document.createElement('div');
  el.className = 'wcard'; // NO reveal, NO animation
  const gid = isGdrive(w.src) ? gdriveId(w.src) : null;
  const yt = ytId(w.src);
  const vi = viId(w.src);
  const badge = w.type === 'video' ? '▶ Video' : '◼ Photo';
  let media = '';
  if (gid) media = `<img src="https://drive.google.com/thumbnail?id=${gid}&sz=w800" loading="lazy" onerror="this.style.opacity='.3'">`;
  else if (yt) media = `<img src="https://img.youtube.com/vi/${yt}/mqdefault.jpg" loading="lazy">`;
  else if (vi) media = `<div style="width:100%;aspect-ratio:16/9;background:#eee;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:2rem;">▶</div>`;
  else if (w.type === 'video') media = `<video src="${w.src}" muted loop playsinline preload="metadata"></video>`;
  else media = `<img src="${w.src}" loading="lazy">`;
  el.innerHTML = `${media}<div class="woverlay"><p class="wcard-title">${w.title}</p><p class="wcard-cat">${w.category}${w.year?' · '+w.year:''}</p></div><div class="wbadge">${badge}</div>`;
  if (w.type === 'video' && !gid && !yt && !vi) {
    el.addEventListener('mouseenter', () => { const v = el.querySelector('video'); if(v) v.play(); });
    el.addEventListener('mouseleave', () => { const v = el.querySelector('video'); if(v){v.pause();v.currentTime=0;} });
  }
  el.addEventListener('click', () => { lbIdx = globalIdx; openLb(); });
  return el;
}

function renderGrid(works) {
  const grid = document.getElementById('works-grid');
  // Remove all columns
  grid.querySelectorAll('.works-col').forEach(e => e.remove());

  const empty = document.getElementById('works-empty');
  if (!works.length) {
    empty.style.display = '';
    empty.querySelector('p').textContent = 'Работ не найдено';
    grid.appendChild(empty);
    return;
  }
  empty.style.display = 'none';

  const cols = getColCount();
  const colEls = [];
  for (let c = 0; c < cols; c++) {
    const col = document.createElement('div');
    col.className = 'works-col';
    grid.appendChild(col);
    colEls.push(col);
  }

  // Distribute cards across columns left-to-right (fills gaps naturally)
  works.forEach((w, i) => {
    colEls[i % cols].appendChild(makeCard(w, i));
  });
}

function openLb() {
  const w = visibleWorks[lbIdx]; if (!w) return;
  document.getElementById('lb-title').textContent = w.title;
  document.getElementById('lb-cat').textContent = w.category + (w.year ? ' · ' + w.year : '');
  const c = document.getElementById('lb-media');
  const gid = isGdrive(w.src) ? gdriveId(w.src) : null;
  const yt = ytId(w.src); const vi = viId(w.src);
  if (gid) c.innerHTML = `<iframe src="https://drive.google.com/file/d/${gid}/preview" allowfullscreen allow="autoplay"></iframe>`;
  else if (yt) c.innerHTML = `<iframe src="https://www.youtube.com/embed/${yt}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
  else if (vi) c.innerHTML = `<iframe src="https://player.vimeo.com/video/${vi}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
  else if (w.type === 'video') c.innerHTML = `<video src="${w.src}" controls autoplay style="width:min(88vw,1100px);max-height:78vh;display:block;"></video>`;
  else c.innerHTML = `<img src="${w.src}" style="max-width:88vw;max-height:78vh;object-fit:contain;display:block;">`;
  document.getElementById('lb').classList.add('open');
}
function closeLb() { document.getElementById('lb').classList.remove('open'); document.getElementById('lb-media').innerHTML = ''; }
function lbNav(d) { lbIdx = (lbIdx + d + visibleWorks.length) % visibleWorks.length; openLb(); }

window.addEventListener('scroll', () => document.getElementById('nav').classList.toggle('sc', scrollY > 60));
document.getElementById('lb').addEventListener('click', function(e) { if(e.target===this) closeLb(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key==='Escape') closeLb();
  if (e.key==='ArrowRight') lbNav(1);
  if (e.key==='ArrowLeft') lbNav(-1);
});

// Re-render on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (visibleWorks.length) renderGrid(visibleWorks); }, 200);
});

init();
</script>
</body>
</html>
